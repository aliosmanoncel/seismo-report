name: Aftershock Update

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 İstanbul (UTC+3)
  workflow_dispatch:       # GitHub arayüzünden manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # git push için gerekli

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Artçı güncelleme çalıştır
        run: python scripts/aftershock_update.py aftershock-update

      - name: Blogger PAGE ve POST güncelle
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: python scripts/blogger_update.py

      - name: Değişiklikleri commit et ve push et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          # Değişiklik yoksa commit hata verir — || true ile sessizce geçer
          git diff --cached --quiet || git commit -m "auto: artci guncelleme $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
